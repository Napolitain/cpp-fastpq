name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          c++ --version
          cmake --version

      - name: Compile tests directly
        run: |
          mkdir -p build/ci
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Werror -Iinclude \
            tests/multi_queue_priority_queue_tests.cpp \
            -o build/ci/cpp_pq_tests

      - name: Run tests directly
        run: build/ci/cpp_pq_tests

      - name: Compile benchmark directly
        run: |
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Werror -Iinclude \
            benchmarks/benchmark_priority_queues.cpp \
            -o build/ci/cpp_pq_benchmark

      - name: Configure CMake
        run: |
          cmake -S . -B build/ci/cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCPP_PQ_BUILD_TESTS=ON \
            -DCPP_PQ_BUILD_BENCHMARKS=ON \
            -DCPP_PQ_ENABLE_FOLLY_FBVECTOR=OFF

      - name: Build CMake targets
        run: cmake --build build/ci/cmake --parallel

      - name: Run CTest
        run: ctest --test-dir build/ci/cmake --output-on-failure
